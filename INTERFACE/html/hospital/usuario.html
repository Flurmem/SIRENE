<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Hospital</title>
    <link rel="stylesheet" href="../../css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&display=swap" rel="stylesheet">

</head>

<body>
    <header>
        <div class="faixaLogo">

            <div class="containerLogo">
                <p class="logo">SIRENE</p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" class='w-100' preserveAspectRatio="none"
                style="max-height: 3rem;">
                <path fill="#2A9D8F" fill-opacity=".5"
                    d="M0,160L48,170.7C96,181,192,203,288,202.7C384,203,480,181,576,160C672,139,768,117,864,117.3C960,117,1056,139,1152,149.3C1248,160,1344,160,1392,160L1440,160L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z">
                </path>
                <path fill="#2A9D8F" fill-opacity=".5"
                    d="M0,160L48,133.3C96,107,192,53,288,74.7C384,96,480,192,576,240C672,288,768,288,864,277.3C960,267,1056,245,1152,208C1248,171,1344,117,1392,90.7L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z">
                </path>
                <path fill="#2A9D8F" fill-opacity="1"
                    d="M0,320L48,314.7C96,309,192,299,288,245.3C384,192,480,96,576,64C672,32,768,64,864,85.3C960,107,1056,117,1152,138.7C1248,160,1344,192,1392,208L1440,224L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z">
                </path>
            </svg>
        </div>
    </header>


    <main>

        <div class="flexColumn">
            <a class="m-5 font4 link" href="../hospital/painel.html">
                <div class="icon"></div>
                <div>
                    <p>Voltar a Página Inicial</p>
                </div>
            </a>

            <div class="containerMainUsuario">

                <input type="checkbox" id="mudaPraLogin" class="escondido">
                <div class="sectionImagens">
                    <div class="w-100 h-100 p-relative">
                        <img class="imagemFundo cantoDireitoSuperior" src="../../static/images/hospital.png">
                        <img class="imagemFundo cantoEsquerdoInferior" src="../../static/images/ambulancia.jpg">
                    </div>
                </div>
                <div class="containerCadastroUsuario">

                    <div class="tituloForm">
                        <h1> Cadastro de Usuario </h1>
                    </div>

                    <div class="containerForm">
                        <div class="containerCampos">
                            <div class="containerCampo">
                                <p>Nome Usuario</p>
                                <div>
                                    <input type="text" name="username" id="username"
                                        placeholder="Ex: Carlos José Pereira da Silva">
                                </div>
                            </div>
                            <div class="containerCampo">
                                <p>CPF</p>
                                <div>
                                    <input type="text" name="username" id="username" placeholder="Ex: 123.456.789-11">
                                </div>
                            </div>
                            <div class="containerCampo">
                                <p>Função</p>
                                <div>
                                    <input type="text" name="username" id="username"
                                        placeholder="Enfermeiro, Secretária, etc...">
                                </div>
                            </div>
                            <div class="containerCampo">
                                <p>Senha</p>
                                <div>
                                    <input type="text" name="username" id="username"
                                        placeholder="Ex: Carlos José Pereira da Silva">
                                </div>
                            </div>
                        </div>
                        <div class="containerBotaoConfirma">
                            <button class="botaoConfirma">
                                <div class="icon"></div>
                                <p> Enviar </p>
                            </button>
                        </div>
                    </div>

                    <div class="mudapraLogin">

                        <label for="mudaPraLogin" class="botaoAtivo"> Já possui Log-in? Entre aqui </label>
                    </div>
                </div>

                <div class="containerComplementarCadastro">
                    <div class="fonteLogo tamanhoLogo">SIRENE</div>
                    <div class="containerimagemTelaCadastro">
                        <img class="imagemTelaCadastro" src="../../static/images/paramedicos.png">
                    </div>
                    <div>
                        <p> Obrigado por fazer parte desse time </p>
                    </div>
                </div>


                <div class="containerLoginUsuario">
                    <div class="tituloForm">
                        <h1> Log-in </h1>
                    </div>

                    <div class="containerForm">
                        <div class="containerCampos">
                            <div class="containerCampo">
                                <p>Nome Usuario</p>
                                <div>
                                    <input type="text" name="username" id="username"
                                        placeholder="Ex: Carlos José Pereira da Silva">
                                </div>
                            </div>
                            <div class="containerCampo">
                                <p>Senha</p>
                                <div>
                                    <input type="text" name="username" id="username" placeholder="">
                                </div>
                            </div>
                        </div>
                        <div class="containerBotaoConfirma">
                            <button class="botaoConfirma">
                                <div class="icon"></div>
                                <p> Entrar </p>
                            </button>
                        </div>
                    </div>

                    <div class="mudapraLogin">

                        <label for="mudaPraLogin" class="botaoAtivo"> Cadastrar outro Usuário </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
